<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNM.ai | Learning Mentor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <h1>PNM.ai</h1>
        
        <div id="chatbox">
            <div class="bot">Welcome. What academic objectives shall we address today?</div>
        </div>

        <div class="input-area">
            <input 
                id="userInput" 
                type="text" 
                placeholder="Describe your task or question..." 
                onkeypress="if(event.key === 'Enter') sendMessage()"
            >
            <button onclick="sendMessage()">Send</button>
            <button onclick="clearChat()" style="background: transparent; color: #355872; border: 1px solid #355872; padding: 5px 10px; font-size: 0.8rem;">Clear</button>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- ✅ ADD THIS (fixes Clear button + prevents errors) -->
    <script>
        function clearChat() {
            document.getElementById("chatbox").innerHTML = "";
        }
    </script>

</body>
</html>
